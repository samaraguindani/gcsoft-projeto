name: CI Pipeline - GCSoft

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ────────────────────────────────────────────
  # D) Testes Automatizados + E) Qualidade
  # ────────────────────────────────────────────
  test-and-quality:
    name: Testes e Qualidade de Código
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 Checkout do código
        uses: actions/checkout@v4

      - name: 🐘 Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, xml, zip
          coverage: none

      - name: 📦 Instalar dependências (Composer)
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: 📁 Criar pasta de relatórios
        run: mkdir -p reports

      - name: 🧪 Executar 20 testes automatizados (PHPUnit)
        run: |
          echo "========================================="
          echo "  EXECUTANDO TESTES AUTOMATIZADOS"
          echo "========================================="
          vendor/bin/phpunit --testdox --log-junit reports/junit.xml
          echo "========================================="

      - name: 📊 Exibir estatísticas dos testes
        if: always()
        run: |
          echo "========================================="
          echo "  ESTATÍSTICAS DE EXECUÇÃO DOS TESTES"
          echo "========================================="
          if [ -f reports/junit.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' reports/junit.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' reports/junit.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' reports/junit.xml | head -1)
            TIME=$(grep -oP 'time="\K[0-9.]+' reports/junit.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS))
            echo "  Total de testes : $TESTS"
            echo "  ✅ Passou        : $PASSED"
            echo "  ❌ Falhou        : $FAILURES"
            echo "  💥 Erros         : $ERRORS"
            echo "  ⏱️  Tempo total   : ${TIME}s"
          fi
          echo "========================================="

      - name: 📤 Salvar relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/

      - name: 🔍 Análise de qualidade (PHP CodeSniffer - PSR-12)
        run: |
          echo "========================================="
          echo "  ANÁLISE DE QUALIDADE DE CÓDIGO (PSR-12)"
          echo "========================================="
          vendor/bin/phpcs src/ --standard=PSR12 --report=summary || true
          echo "========================================="

  # ────────────────────────────────────────────
  # Build da imagem Docker (artefato para deploy)
  # ────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test-and-quality

    steps:
      - name: 🔄 Checkout do código
        uses: actions/checkout@v4

      - name: 🐳 Build da imagem Docker
        run: |
          docker build -t gcsoft-app:${{ github.sha }} .
          docker tag gcsoft-app:${{ github.sha }} gcsoft-app:latest
          echo "✅ Imagem construída: gcsoft-app:${{ github.sha }}"

      - name: 💾 Exportar imagem como artefato
        run: |
          docker save gcsoft-app:latest | gzip > gcsoft-app.tar.gz
          echo "Tamanho da imagem: $(du -sh gcsoft-app.tar.gz)"

      - name: 📤 Upload da imagem
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: gcsoft-app.tar.gz
          retention-days: 7
