services:

  app-homolog:
    image: gcsoft-app:homolog
    container_name: gcsoft_homolog_app
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      APP_ENV: homolog
      DB_HOST: mysql-shared
      DB_PORT: 3306
      DB_NAME: gcsoft_homolog
      DB_USER: gcsoft
      DB_PASS: gcsoft123
    depends_on:
      mysql-shared:
        condition: service_healthy
    networks:
      - gcsoft-net

  mysql-shared:
    image: mysql:8.0
    container_name: gcsoft_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_USER: gcsoft
      MYSQL_PASSWORD: gcsoft123
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - gcsoft-net

volumes:
  mysql-data:

networks:
  gcsoft-net:
    name: gcsoft-net
    driver: bridge
