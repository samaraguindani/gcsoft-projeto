services:

  app-homolog:
    image: gcsoft-app:homolog
    container_name: gcsoft_homolog_app
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      APP_ENV: homolog
      DB_HOST: db-homolog
      DB_PORT: 3306
      DB_NAME: gcsoft_homolog
      DB_USER: gcsoft
      DB_PASS: gcsoft123
    depends_on:
      db-homolog:
        condition: service_healthy
    networks:
      - homolog-net

  db-homolog:
    image: mysql:8.0
    container_name: gcsoft_homolog_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: gcsoft_homolog
      MYSQL_USER: gcsoft
      MYSQL_PASSWORD: gcsoft123
    ports:
      - "3307:3306"
    volumes:
      - homolog-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "gcsoft", "-pgcsoft123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homolog-net

  flyway-homolog:
    image: flyway/flyway:10
    container_name: gcsoft_homolog_flyway
    command: -url=jdbc:mysql://db-homolog:3306/gcsoft_homolog -user=gcsoft -password=gcsoft123 -connectRetries=10 migrate
    volumes:
      - ../../db/migrations:/flyway/sql
    depends_on:
      db-homolog:
        condition: service_healthy
    networks:
      - homolog-net

volumes:
  homolog-db-data:

networks:
  homolog-net:
    driver: bridge
